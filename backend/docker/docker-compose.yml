services:
  postgres:
    image: postgres:16-alpine
    container_name: acrg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acrg
      POSTGRES_PASSWORD: acrg_secret
      POSTGRES_DB: acrg_db
    ports:
      - '5432:5432'
    volumes:
      - acrg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U acrg -d acrg_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acrg-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - acrg_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: acrg-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://acrg:acrg_secret@postgres:5432/acrg_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-min-32-chars-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-min-32-chars-long}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  acrg_postgres_data:
  acrg_redis_data:
